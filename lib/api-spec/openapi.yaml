components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        breakGlass:
          type: string
          enum: [disabled, ok, failed]
          description: >-
            Status of the emergency break-glass login seeder. "failed" means the
            feature is configured but the emergency CIO account could not be
            created on boot, which forces the overall status to "degraded".
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [cio, helpdesk, network, security, network_engineer, security_engineer, staff]
        department:
          type: string
        jobTitle:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, email, name, role]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    EntraStatus:
      type: object
      properties:
        configured:
          type: boolean
      required: [configured]

    EntraExchangeBody:
      type: object
      properties:
        code:
          type: string
      required: [code]

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [cio, helpdesk, network, security, network_engineer, security_engineer, staff]
        department:
          type: string
        isActive:
          type: boolean

    Entry:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        userRole:
          type: string
        category:
          type: string
          enum: [helpdesk, network, security, general]
        title:
          type: string
        description:
          type: string
        accomplishments:
          type: string
        challenges:
          type: string
        supportNeeded:
          type: string
        ticketCount:
          type: integer
        weekOf:
          type: string
          description: ISO date string of week start
        entryDate:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        isSubmitted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, category, title, description, weekOf, isSubmitted, createdAt]

    CreateEntryBody:
      type: object
      properties:
        category:
          type: string
          enum: [helpdesk, network, security, general]
        title:
          type: string
        description:
          type: string
        accomplishments:
          type: string
        challenges:
          type: string
        supportNeeded:
          type: string
        ticketCount:
          type: integer
        weekOf:
          type: string
        entryDate:
          type: string
        tags:
          type: array
          items:
            type: string
        isSubmitted:
          type: boolean
      required: [category, title, description, weekOf]

    Report:
      type: object
